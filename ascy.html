<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f7fb;
            color: #1d2733;
        }

        .continer {
            display: flex;
            flex-direction: column;
            gap: 20px;
           margin-top: 30px;
            align-items: center;
            justify-content: space-between;
        }

        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 200px;
            width: 100%;
        }

        

        .card {
            background: #ffffff;
            border-radius: 14px;
            width: 100%;
            padding: 20px;
            border: 1px solid #e2e8f0;
        }

        .card h2 {
            margin: 0 0 12px;
            font-size: 1.2rem;
            color: #0f172a;
        }

        .card h3 {
            margin: 16px 0 10px;
            font-size: 1rem;
            color: #334155;
        }

        .card p {
            margin: 8px 0;
            line-height: 1.5;
        }

        .card ul {
            margin: 0;
            padding-left: 18px;
        }

        .card li {
            margin-bottom: 6px;
            font-size: 0.95rem;
        }
        .product{
            display: flex;
            width: 100%;
            height: 300px;
            flex-direction:row;
            align-items: center;
            gap: 20px;
            border: 2px solid #e2e8f0;

        }
        pro{
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div class="continer">
        <div class="cards">
            <div id="card">
                

            </div>
        </div>
    </div>
    
</body>
<script src="ascy.js"></script>
</html>
