<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    * {
    margin: 0%;
    padding: 0%;
}

.container {
    .cards {
        display: flex;
        gap: 30px;
        flex-wrap: wrap;
        justify-content: space-evenly;

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* display: flex; */
            /* flex-direction: column; */
            justify-content: center;
            
            width: 400px;
            height: 600px;
            border-radius: 30px;
            border: 2px solid black;
            gap: 6px;
            align-items: center;
            justify-content: center;
            margin-top: 9px;
            padding: 12px;
            padding: 30px;
            justify-content: space-evenly;
            background: rgb(235, 148, 85);

            img {
                width: 300px;
                height: 250px;
            }
            h2{
                font-weight:lighter;
                font-size: 20px;
                text-decoration: dashed;
            }
            p{
                text-align: justify;
            }

        }

    }
}
nav{
    display: flex;
    gap: 30px;
    justify-content: center;
    background: rgb(235, 148, 85);
    padding: 12px;
    a{
        text-decoration: none;
        color: black;
        font-size: 20px;
        font-weight: lighter;
        border-bottom: 2px solid transparent;
        transition: all 0.3s ease-in-out;

        &:hover{
            border-bottom: 2px solid black;
        }
    }
}
</style>
</head>
<body>
    <nav class="nav"><a href="">dinner</a>
        <a href="" id="lunch">lunch</a>
        <a href="" id="breakfast">breakfast</a>
        <a href="" id="desert">desert</a>
        <a href="" id="snack">snack</a>
    </nav>


    <div class="container">\
        <div class="cards">
           
        </div>
    </div>
    
    <script src="qoutes.js"></script>
</body>
</html>
