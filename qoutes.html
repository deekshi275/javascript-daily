<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f1f5f9;
            color: #111;
        }

        .continer {
            width: 100%;
            min-height: 100vh;
            padding: 20px;
        }

        nav {
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
        }

        .cards {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 20px;
        }

        .card {
            width: calc(33.333% - 13.333px);
            min-width: 250px;
            background-color: rgb(49, 85, 80);
            color: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card h1 {
            font-size: 0.9rem;
            letter-spacing: 0.12em;
            color: #f8c471;
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 6px;
        }

        .card img {
            width: 100%;
            border-radius: 12px;
            object-fit: cover;
            max-height: 320px;
        }

        .card p {
            line-height: 1.6;
            color: #000000;
        }

        .card span {
            font-weight: 600;
            color: #000000;
        }
        nav{
          
            background-color: #0f172a;
            height: 80px;
            display: flex;
            justify-content: space-around;
           align-items: center;
        }
        button{
            width: 100px;
            height: 40px;
            font-size: large;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        button:hover{
            background-color: #0f172a;
            color: white;
        }
        nav:hover{
            background-color: #f7f7f7;
            color: #0f172a;

        }
        .card:hover{
            background-color: #425d80;
            color: black;
        }
    </style>
</head>
<body>
    <div class="continer">
        <nav>
            <button id="breakfast", onclick="done()">breakfast</button>
            <button id="dinner"  onclick="done()">dinner</button>
            <button>snack</button>
            <button>desert</button>
        </nav>
        <div class="cards"></div>
    </div>
    <script src="qoutes.js"></script>
</body>
</html>
