<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background:lightcoral;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 40px 20px;
        }
        
        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            align-items: center;
        }
        
        .card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: lightcyan;
            width: 350px;
            height: 450px;
            border-radius: 20px;
            color: black;
            padding: 20px;
            gap: 10px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover{
            background-color:darkolivegreen;
        }
        
       
        
        .card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid lightskyblue;
            object-fit: cover;
        }
        
        .card #id, .card #firstName, .card #lastName, .card #age, .card #gender {
            font-size: 16px;
            font-weight: 700;
            color:black;
        }
        
        .card #email, .card #contactNumber, .card #role {
            font-size: 14px;
            font-weight: 600;
            color:black;
            text-align: center;
        }
        
        .card #bloodGroup {
            font-size: 14px;
            font-weight: 700;
            color: #e74c3c;
            background: #ffe6e6;
            padding: 6px 12px;
            border-radius: 15px;
        }
        
        .card #address {
            font-size: 14px;
            font-weight: 600;
            color: black;
            text-align: center;
            padding-top: 10px;
        }
        
        .card .span1 {
            padding-top: 20px;
            display: flex;
            gap: 30px;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cards">
            <!-- <div class="card">
                
            </div>  -->
        </div>
    </div>
    

</body>
<script src="promise_card_task.js   "></script>
</html>
